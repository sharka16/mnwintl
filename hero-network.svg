<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" width="1920" height="900" role="img">
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0b1730"/>
      <stop offset="45%"  stop-color="#132a4f"/>
      <stop offset="100%" stop-color="#1d3968"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4d76b8" stop-opacity=".45"/>
      <stop offset="70%"  stop-color="#2b4d86" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#0b1730" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#8fb0dd" stop-opacity=".85"/>
      <stop offset="55%"  stop-color="#5d82b8" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#8fb0dd" stop-opacity=".18"/>
    </linearGradient>

    <linearGradient id="ringSoft" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8dcf5" stop-opacity=".5"/>
      <stop offset="60%"  stop-color="#6f92c8" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#6f92c8" stop-opacity=".06"/>
    </linearGradient>

    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b98a4a" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#d9b478" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#e7d3ae" stop-opacity=".25"/>
    </linearGradient>

    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="1.6" fill="#93b2df" opacity=".16"/>
    </pattern>

    <!-- keeps the dot grid from running under the headline on the left -->
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#000" stop-opacity="0"/>
      <stop offset="34%" stop-color="#000" stop-opacity=".55"/>
      <stop offset="70%" stop-color="#000" stop-opacity="1"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1920" height="900" fill="url(#fadeLeft)"/>
    </mask>
  </defs>

  <!-- ground -->
  <rect width="1920" height="900" fill="url(#field)"/>
  <rect width="1920" height="900" fill="url(#grid)" mask="url(#gridMask)"/>
  <ellipse cx="1330" cy="430" rx="620" ry="520" fill="url(#glow)"/>

  <!-- orbital globe, echoing the mark in the logo -->
  <g transform="translate(1330 430)" fill="none" stroke-linecap="round">
    <circle r="290" stroke="url(#ring)" stroke-width="1.6" opacity=".55"/>

    <!-- meridians -->
    <ellipse rx="96"  ry="290" stroke="url(#ring)"     stroke-width="1.5" opacity=".7"/>
    <ellipse rx="198" ry="290" stroke="url(#ringSoft)" stroke-width="1.3" opacity=".55"/>

    <!-- parallels -->
    <ellipse rx="290" ry="96"  stroke="url(#ringSoft)" stroke-width="1.2" opacity=".4"/>
    <ellipse rx="290" ry="198" stroke="url(#ringSoft)" stroke-width="1.1" opacity=".3"/>

    <!-- the two tilted rings that give the logo its motion -->
    <ellipse rx="360" ry="140" transform="rotate(-28)" stroke="url(#ring)"     stroke-width="2.1" opacity=".9"/>
    <ellipse rx="360" ry="140" transform="rotate(34)"  stroke="url(#ringSoft)" stroke-width="1.8" opacity=".6"/>
  </g>

  <!-- trade routes -->
  <g fill="none" stroke="url(#arc)" stroke-linecap="round">
    <path d="M300 690 C 620 560, 900 560, 1180 470" stroke-width="1.9" opacity=".75"/>
    <path d="M300 690 C 700 700, 1080 640, 1440 520" stroke-width="1.5" opacity=".5"/>
    <path d="M1180 470 C 1360 380, 1520 330, 1690 300" stroke-width="1.5" opacity=".55"/>
    <path d="M300 690 C 560 460, 900 300, 1260 250" stroke-width="1.2" opacity=".33"/>
  </g>

  <!-- nodes along the routes -->
  <g>
    <circle cx="300"  cy="690" r="7"   fill="#e7d3ae"/>
    <circle cx="300"  cy="690" r="15"  fill="none" stroke="#e7d3ae" stroke-width="1.2" opacity=".55"/>
    <circle cx="300"  cy="690" r="27"  fill="none" stroke="#e7d3ae" stroke-width="1"   opacity=".22"/>

    <circle cx="1180" cy="470" r="5.5" fill="#e7d3ae" opacity=".92"/>
    <circle cx="1180" cy="470" r="13"  fill="none" stroke="#e7d3ae" stroke-width="1" opacity=".4"/>

    <circle cx="1440" cy="520" r="4.5" fill="#cfe0f6" opacity=".8"/>
    <circle cx="1690" cy="300" r="4.5" fill="#cfe0f6" opacity=".7"/>
    <circle cx="1260" cy="250" r="3.5" fill="#cfe0f6" opacity=".55"/>
  </g>

  <!-- a few drifting particles for depth -->
  <g fill="#cfe0f6">
    <circle cx="520"  cy="250" r="2"   opacity=".35"/>
    <circle cx="760"  cy="180" r="1.6" opacity=".28"/>
    <circle cx="980"  cy="740" r="2.2" opacity=".3"/>
    <circle cx="1560" cy="700" r="1.8" opacity=".26"/>
    <circle cx="1780" cy="560" r="2.4" opacity=".22"/>
    <circle cx="640"  cy="820" r="1.6" opacity=".2"/>
  </g>

  <!-- settles the base of the frame -->
  <rect y="700" width="1920" height="200" fill="#0b1730" opacity=".22"/>
</svg>
